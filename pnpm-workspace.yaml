packages:
  - 'packages/*'
  - 'examples/*'
  - 'docs/*'
  - 'tooling/*'

allowBuilds:
  '@parcel/watcher': false
  esbuild: true
  msw: false
  sharp: false
  unrs-resolver: false

catalog:
  livekit-client: ^2.20.1
  # Must match the exact @livekit/protocol version that livekit-client pins, so the
  # workspace and livekit-client share a single copy. Mismatched versions cause
  # structurally-incompatible protobuf types (e.g. TrackInfo) and break the build.
  '@livekit/protocol': 1.46.6
  eslint: ^10.0.0
  prettier: ^3.8.1

minimumReleaseAge: 14400
minimumReleaseAgeExclude:
  - '@livekit/*'
  - livekit-client
  - livekit-server-sdk
  # Renovate security update: js-yaml@4.3.0
  - js-yaml@4.3.0

overrides:
  '@typescript-eslint/eslint-plugin': ^8.58.0
  '@typescript-eslint/parser': ^8.58.0
  '@typescript-eslint/scope-manager': ^8.58.0
  '@typescript-eslint/types': ^8.58.0
  '@typescript-eslint/typescript-estree': ^8.58.0
  '@typescript-eslint/utils': ^8.58.0
